<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#3D2C2C" />
  <title>Natalie Studio - Management Salon</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #FDF6F0;
      --rose-dark: #C97B84;
      --rose: #E8A4A4;
      --rose-pale: #FDF0EF;
      --gold: #C9A96E;
      --text: #3D2C2C;
      --text-mid: #7A5C5C;
      --text-light: #B08080;
      --border: #F0DDD8;
      --success: #8AAF8A;
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      -webkit-tap-highlight-color: transparent;
    }

    body { 
      font-family: 'Nunito', sans-serif; 
      background: var(--bg); 
      color: var(--text);
      overflow-x: hidden;
    }

    @keyframes spin { 
      to { transform: rotate(360deg); } 
    }

    .custom-scroll::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scroll::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scroll::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- CONFIGURARE SUPABASE ---
    const sb = supabase.createClient(
      'https://qmjjrbtjcmthxzwjhfwg.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtampyYnRqY210aHh6d2poZndnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxODcwNDEsImV4cCI6MjA4OTc2MzA0MX0.lG-xr_fv0TkHCxRrKDgOYbvYd1QtJgRh6Di-cs0ggZg'
    );

    const C = {
      bg: "#FDF6F0", 
      roseDark: "#C97B84", 
      rose: "#E8A4A4", 
      rosePale: "#FDF0EF",
      gold: "#C9A96E", 
      text: "#3D2C2C", 
      textMid: "#7A5C5C", 
      textLight: "#B08080",
      border: "#F0DDD8", 
      success: "#8AAF8A", 
      warn: "#D4A04A", 
      danger: "#C94A4A"
    };

    const HOURS = Array.from({length: 32}, (_, i) => {
      const h = Math.floor(i / 2) + 6;
      const m = i % 2 === 0 ? "00" : "30";
      return `${String(h).padStart(2, "0")}:${m}`;
    }).filter(t => t >= "08:00" && t <= "21:00");

    const NAV = [
      { id: "dashboard", icon: "⬡", label: "Home" },
      { id: "calendar", icon: "▦", label: "Calendar" },
      { id: "appointments", icon: "☰", label: "Programări" },
      { id: "clients", icon: "♡", label: "Clienți" },
      { id: "services", icon: "✦", label: "Servicii" },
      { id: "staff", icon: "◈", label: "Specialiști" },
    ];

    const fmt = d => d.toISOString().split("T")[0];
    const todayStr = fmt(new Date());

    // --- COMPONENTE REUTILIZABILE ---

    function Spinner() {
      return (
        <div style={{ display: "flex", justifyContent: "center", padding: "50px 0" }}>
          <div style={{ 
            width: 35, 
            height: 35, 
            border: `3px solid ${C.border}`, 
            borderTop: `3px solid ${C.roseDark}`, 
            borderRadius: "50%", 
            animation: "spin 0.8s linear infinite" 
          }} />
        </div>
      );
    }

    function Modal({ title, onClose, children }) {
      return (
        <div style={{ 
          position: "fixed", 
          inset: 0, 
          background: "rgba(61,44,44,0.5)", 
          zIndex: 1000, 
          display: "flex", 
          alignItems: "flex-end", 
          justifyContent: "center",
          backdropFilter: "blur(2px)"
        }}>
          <div style={{ 
            background: "#fff", 
            borderRadius: "24px 24px 0 0", 
            padding: "10px 24px 40px", 
            width: "100%", 
            maxWidth: 550, 
            maxHeight: "92vh", 
            overflowY: "auto",
            boxShadow: "0 -5px 25px rgba(0,0,0,0.1)"
          }}>
            <div style={{ width: 40, height: 4, background: C.border, borderRadius: 10, margin: "10px auto 20px" }} />
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
              <h2 style={{ fontSize: 20, fontWeight: 800, color: C.text, fontFamily: "Georgia, serif" }}>{title}</h2>
              <button onClick={onClose} style={{ background: C.rosePale, border: "none", width: 32, height: 32, borderRadius: "50%", cursor: "pointer", color: C.textLight }}>✕</button>
            </div>
            {children}
          </div>
        </div>
      );
    }

    function FInput({ label, ...props }) {
      return (
        <div style={{ marginBottom: 15 }}>
          <label style={{ display: "block", fontSize: 11, fontWeight: 800, color: C.textMid, marginBottom: 6, letterSpacing: 0.5, textTransform: "uppercase" }}>{label}</label>
          <input {...props} style={{ 
            width: "100%", 
            padding: "12px 15px", 
            borderRadius: 12, 
            border: `1.5px solid ${C.border}`, 
            fontSize: 15, 
            color: C.text, 
            background: C.rosePale,
            fontFamily: "inherit",
            outline: "none"
          }} />
        </div>
      );
    }

    function FSelect({ label, children, ...props }) {
      return (
        <div style={{ marginBottom: 15 }}>
          <label style={{ display: "block", fontSize: 11, fontWeight: 800, color: C.textMid, marginBottom: 6, letterSpacing: 0.5, textTransform: "uppercase" }}>{label}</label>
          <select {...props} style={{ 
            width: "100%", 
            padding: "12px 15px", 
            borderRadius: 12, 
            border: `1.5px solid ${C.border}`, 
            fontSize: 15, 
            color: C.text, 
            background: C.rosePale,
            fontFamily: "inherit",
            outline: "none"
          }}>
            {children}
          </select>
        </div>
      );
    }

    function Btn({ children, variant = "primary", small, ...props }) {
      const bStyle = {
        primary: { background: `linear-gradient(135deg, ${C.roseDark}, ${C.gold})`, color: "#fff", border: "none" },
        secondary: { background: "transparent", color: C.roseDark, border: `1.5px solid ${C.roseDark}` },
        danger: { background: "#FEE2E2", color: C.danger, border: "none" }
      };
      return (
        <button {...props} style={{ 
          padding: small ? "7px 15px" : "12px 20px", 
          borderRadius: 12, 
          fontWeight: 700, 
          fontSize: small ? 12 : 14, 
          cursor: "pointer", 
          ...bStyle[variant], 
          ...props.style 
        }}>
          {children}
        </button>
      );
    }

    // --- LOGICA APLICAȚIEI ---

    function App() {
      const [page, setPage] = useState("dashboard");
      const [isMobile] = useState(window.innerWidth < 768);
      const [loading, setLoading] = useState(true);

      // Date principale
      const [appointments, setAppointments] = useState([]);
      const [clients, setClients] = useState([]);
      const [services, setServices] = useState([]);
      const [staffList, setStaffList] = useState([]);

      // State-uri UI
      const [showForm, setShowForm] = useState(false);
      const [editAppId, setEditAppId] = useState(null);
      const [search, setSearch] = useState("");
      const [calDate, setCalDate] = useState(todayStr);
      const [saving, setSaving] = useState(false);

      // Formular Programare
      const [form, setForm] = useState({
        clientName: "", phone: "", serviceId: "", staff: "", 
        date: todayStr, time: "09:00", notes: "", status: "in_asteptare"
      });

      // State-uri Secundare (Servicii / Staff)
      const [showSvcForm, setShowSvcForm] = useState(false);
      const [svcForm, setSvcForm] = useState({ name: "", duration: 60, price: 0, color: "#E8A4A4" });
      const [editSvcId, setEditSvcId] = useState(null);

      const [showStaffForm, setShowStaffForm] = useState(false);
      const [staffForm, setStaffForm] = useState({ name: "" });
      const [editStaffId, setEditStaffId] = useState(null);

      async function refreshAll() {
        setLoading(true);
        const [a, c, s, st] = await Promise.all([
          sb.from("appointments").select("*").order("date"),
          sb.from("clients").select("*").order("name"),
          sb.from("services").select("*").order("id"),
          sb.from("staff").select("*").order("name")
        ]);
        setAppointments(a.data || []);
        setClients(c.data || []);
        setServices(s.data || []);
        setStaffList(st.data || []);
        setLoading(false);
      }

      useEffect(() => { refreshAll(); }, []);

      // --- AUTOCOMPLETE TELEFON ---
      function handleNameChange(e) {
        const name = e.target.value;
        setForm(p => ({ ...p, clientName: name }));
        const found = clients.find(c => c.name.toLowerCase().trim() === name.toLowerCase().trim());
        if (found && found.phone) {
          setForm(p => ({ ...p, phone: found.phone }));
        }
      }

      // --- CRUD OPERATIONS ---

      async function saveAppointment() {
        if (!form.clientName || !form.serviceId) return alert("Completează numele și serviciul!");
        setSaving(true);
        
        const data = {
          client_name: form.clientName, phone: form.phone,
          service_id: parseInt(form.serviceId), staff: form.staff,
          date: form.date, time: form.time, notes: form.notes, status: form.status
        };

        if (editAppId) {
          await sb.from("appointments").update(data).eq("id", editAppId);
        } else {
          await sb.from("appointments").insert(data);
        }

        // Sync Client
        const exists = clients.find(c => c.name.toLowerCase().trim() === form.clientName.toLowerCase().trim());
        if (exists) {
          if (form.phone && form.phone !== exists.phone) {
            await sb.from("clients").update({ phone: form.phone }).eq("id", exists.id);
          }
        } else {
          await sb.from("clients").insert({ name: form.clientName, phone: form.phone || "" });
        }

        await refreshAll();
        setSaving(false);
        setShowForm(false);
      }

      async function deleteApp(id) {
        if (!confirm("Sigur ștergi?")) return;
        await sb.from("appointments").delete().eq("id", id);
        refreshAll();
      }

      // --- RENDER PAGINI ---

      const Dashboard = () => {
        const azi = appointments.filter(a => a.date === todayStr);
        return (
          <div style={{ padding: isMobile ? "20px" : "40px" }}>
            <h1 style={{ fontFamily: "Georgia, serif", fontSize: 28, marginBottom: 5 }}>Bună, Natalie! ✨</h1>
            <p style={{ color: C.textLight, marginBottom: 25 }}>Rezumatul zilei de astăzi</p>
            
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 15, marginBottom: 30 }}>
              <div style={{ background: "#fff", padding: 20, borderRadius: 20, border: `1px solid ${C.border}` }}>
                <div style={{ fontSize: 11, fontWeight: 800, color: C.textLight, textTransform: "uppercase" }}>Programări Azi</div>
                <div style={{ fontSize: 32, fontWeight: 800, color: C.roseDark }}>{azi.length}</div>
              </div>
              <div style={{ background: "#fff", padding: 20, borderRadius: 20, border: `1px solid ${C.border}` }}>
                <div style={{ fontSize: 11, fontWeight: 800, color: C.textLight, textTransform: "uppercase" }}>Total Clienți</div>
                <div style={{ fontSize: 32, fontWeight: 800, color: C.gold }}>{clients.length}</div>
              </div>
            </div>

            <div style={{ background: "#fff", padding: 20, borderRadius: 24, border: `1px solid ${C.border}` }}>
              <h3 style={{ marginBottom: 20, fontFamily: "Georgia, serif" }}>Urmează acum</h3>
              {azi.length === 0 ? <p style={{ color: C.textLight }}>Nicio programare pentru azi.</p> : 
                azi.sort((a,b) => a.time.localeCompare(b.time)).map(a => {
                  const s = services.find(x => x.id === a.service_id);
                  return (
                    <div key={a.id} onClick={() => { setEditAppId(a.id); setForm({clientName: a.client_name, phone: a.phone||"", serviceId: a.service_id, staff: a.staff, date: a.date, time: a.time, notes: a.notes||"", status: a.status}); setShowForm(true); }} style={{ display: "flex", alignItems: "center", gap: 15, padding: "15px 0", borderBottom: `1px solid ${C.border}`, cursor: "pointer" }}>
                      <div style={{ color: C.roseDark, fontWeight: 800, fontSize: 15, width: 50 }}>{a.time}</div>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: 700 }}>{a.client_name}</div>
                        <div style={{ fontSize: 12, color: C.textLight }}>{s?.name} · {a.staff}</div>
                      </div>
                      <div style={{ width: 10, height: 10, borderRadius: "50%", background: s?.color || C.rose }} />
                    </div>
                  );
                })
              }
            </div>
          </div>
        );
      };

      const Calendar = () => {
        const dayApps = appointments.filter(a => a.date === calDate);
        return (
          <div style={{ padding: isMobile ? "20px" : "40px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
              <h1 style={{ fontFamily: "Georgia, serif" }}>Calendar</h1>
              <input type="date" value={calDate} onChange={e => setCalDate(e.target.value)} style={{ padding: "8px", borderRadius: 10, border: `1px solid ${C.border}`, fontFamily: "inherit" }} />
            </div>
            <div style={{ background: "#fff", borderRadius: 20, border: `1px solid ${C.border}`, overflow: "hidden" }}>
              {HOURS.map(h => {
                const app = dayApps.find(a => a.time === h);
                const s = services.find(x => x.id === app?.service_id);
                return (
                  <div key={h} style={{ display: "flex", minHeight: 60, borderBottom: `1px solid ${C.rosePale}` }}>
                    <div style={{ width: 60, padding: 15, fontSize: 12, fontWeight: 700, color: C.textLight, textAlign: "right", borderRight: `1px solid ${C.rosePale}` }}>{h}</div>
                    <div style={{ flex: 1, padding: 5 }}>
                      {app && (
                        <div onClick={() => { setEditAppId(app.id); setForm({clientName: app.client_name, phone: app.phone||"", serviceId: app.service_id, staff: app.staff, date: app.date, time: app.time, notes: app.notes||"", status: app.status}); setShowForm(true); }} style={{ background: (s?.color || C.rose) + "22", borderLeft: `4px solid ${s?.color || C.rose}`, padding: "8px 12px", borderRadius: 8, height: "100%", cursor: "pointer" }}>
                          <div style={{ fontWeight: 700, fontSize: 14 }}>{app.client_name}</div>
                          <div style={{ fontSize: 11 }}>{s?.name}</div>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      };

      const Clients = () => (
        <div style={{ padding: isMobile ? "20px" : "40px" }}>
          <h1 style={{ fontFamily: "Georgia, serif", marginBottom: 20 }}>Clienți</h1>
          <FInput placeholder="Caută client..." value={search} onChange={e => setSearch(e.target.value)} />
          <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 15 }}>
            {clients.filter(c => c.name.toLowerCase().includes(search.toLowerCase()) || (c.phone && c.phone.includes(search))).map(c => (
              <div key={c.id} style={{ background: "#fff", padding: 20, borderRadius: 20, border: `1px solid ${C.border}` }}>
                <div style={{ fontWeight: 800, fontSize: 17 }}>{c.name}</div>
                <div style={{ color: C.textLight, fontSize: 14, marginTop: 5 }}>{c.phone || "Fără număr de telefon"}</div>
                <div style={{ marginTop: 15, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ fontSize: 11, fontWeight: 800, color: C.gold, textTransform: "uppercase" }}>
                    {appointments.filter(a => a.client_name === c.name).length} Vizite
                  </span>
                  <Btn small variant="secondary" onClick={() => { setForm(p => ({ ...p, clientName: c.name, phone: c.phone || "" })); setEditAppId(null); setShowForm(true); }}>Programare Nouă</Btn>
                </div>
              </div>
            ))}
          </div>
        </div>
      );

      // --- RENDER STRUCTURĂ ---

      return (
        <div style={{ display: isMobile ? "block" : "flex", minHeight: "100vh" }}>
          {/* Sidebar Desktop */}
          {!isMobile && (
            <div style={{ width: 260, background: "#3D2C2C", padding: "40px 25px", position: "sticky", top: 0, height: "100vh" }}>
              <div style={{ marginBottom: 40 }}>
                <h2 style={{ color: C.gold, fontFamily: "Georgia, serif", fontSize: 22 }}>Natalie Studio</h2>
                <div style={{ color: "rgba(255,255,255,0.3)", fontSize: 10, letterSpacing: 1, marginTop: 5, textTransform: "uppercase" }}>Beauty Management</div>
              </div>
              {NAV.map(n => (
                <div key={n.id} onClick={() => setPage(n.id)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "14px 18px", borderRadius: 12, cursor: "pointer", marginBottom: 5, color: page === n.id ? C.rose : "rgba(255,255,255,0.5)", background: page === n.id ? "rgba(255,255,255,0.05)" : "transparent", fontWeight: page === n.id ? 700 : 400 }}>
                  <span style={{ fontSize: 18 }}>{n.icon}</span> {n.label}
                </div>
              ))}
            </div>
          )}

          {/* Main Content */}
          <main style={{ flex: 1, paddingBottom: isMobile ? 100 : 40 }}>
            {loading ? <Spinner /> : (
              <>
                {page === "dashboard" && <Dashboard />}
                {page === "calendar" && <Calendar />}
                {page === "clients" && <Clients />}
                {/* Aici poți adăuga paginile Appointments, Services, Staff similare cu cele de sus */}
                {page === "appointments" && <div style={{padding: 40}}><h1>Programări</h1><p>Lista completă de programări...</p></div>}
                {page === "services" && <div style={{padding: 40}}><h1>Servicii</h1><p>Administrare servicii...</p></div>}
                {page === "staff" && <div style={{padding: 40}}><h1>Specialiști</h1><p>Echipa Natalie Studio...</p></div>}
              </>
            )}
          </main>

          {/* Navigație Mobil */}
          {isMobile && (
            <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "#3D2C2C", display: "flex", padding: "10px 5px 25px", borderTop: "1px solid rgba(255,255,255,0.1)", zIndex: 900 }}>
              {NAV.map(n => (
                <div key={n.id} onClick={() => setPage(n.id)} style={{ flex: 1, textAlign: "center", color: page === n.id ? C.rose : "rgba(255,255,255,0.4)", fontSize: 10 }}>
                  <div style={{ fontSize: 22, marginBottom: 4 }}>{n.icon}</div>
                  {n.label}
                </div>
              ))}
            </div>
          )}

          {/* FAB Button */}
          <button onClick={() => { setEditAppId(null); setForm({clientName: "", phone: "", serviceId: services[0]?.id || "", staff: staffList[0]?.name || "", date: todayStr, time: "09:00", notes: "", status: "in_asteptare"}); setShowForm(true); }} style={{ position: "fixed", bottom: isMobile ? 90 : 30, right: 20, width: 56, height: 56, borderRadius: "50%", background: C.roseDark, color: "#fff", border: "none", fontSize: 28, boxShadow: "0 4px 15px rgba(0,0,0,0.2)", cursor: "pointer", zIndex: 800 }}>+</button>

          {/* Formular Modal */}
          {showForm && (
            <Modal title={editAppId ? "Editează Programare" : "Programare Nouă"} onClose={() => setShowForm(false)}>
              <FInput label="Nume Clientă" value={form.clientName} onChange={handleNameChange} placeholder="Nume..." />
              <FInput label="Telefon" value={form.phone} onChange={e => setForm({...form, phone: e.target.value})} placeholder="07xx xxx xxx" />
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <FInput label="Data" type="date" value={form.date} onChange={e => setForm({...form, date: e.target.value})} />
                <FSelect label="Ora" value={form.time} onChange={e => setForm({...form, time: e.target.value})}>
                  {HOURS.map(h => <option key={h} value={h}>{h}</option>)}
                </FSelect>
              </div>
              <FSelect label="Serviciu" value={form.serviceId} onChange={e => setForm({...form, serviceId: e.target.value})}>
                <option value="">Alege serviciu</option>
                {services.map(s => <option key={s.id} value={s.id}>{s.name} ({s.price} lei)</option>)}
              </FSelect>
              <FSelect label="Specialist" value={form.staff} onChange={e => setForm({...form, staff: e.target.value})}>
                {staffList.map(s => <option key={s.id} value={s.name}>{s.name}</option>)}
              </FSelect>
              <Btn onClick={saveAppointment} disabled={saving} style={{ width: "100%", marginTop: 10 }}>{saving ? "Se salvează..." : "Salvează"}</Btn>
              {editAppId && <Btn variant="danger" onClick={() => deleteApp(editAppId)} style={{ width: "100%", marginTop: 10 }}>Șterge Programarea</Btn>}
            </Modal>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
