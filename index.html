<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#3D2C2C" />
  <title>Natalie Studio - Management Salon</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      -webkit-tap-highlight-color: transparent;
    }

    body { 
      font-family: 'Nunito', 'Segoe UI', sans-serif; 
      background: #FDF6F0; 
      color: #3D2C2C;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    @keyframes spin { 
      to { transform: rotate(360deg); } 
    }

    .custom-scroll::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scroll::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scroll::-webkit-scrollbar-thumb {
      background: #F0DDD8;
      border-radius: 10px;
    }

    /* Animatii tranzitii */
    .fade-in {
      animation: fadeIn 0.3s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- CONFIGURARE SUPABASE ---
    const sb = supabase.createClient(
      'https://qmjjrbtjcmthxzwjhfwg.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtampyYnRqY210aHh6d2poZndnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxODcwNDEsImV4cCI6MjA4OTc2MzA0MX0.lG-xr_fv0TkHCxRrKDgOYbvYd1QtJgRh6Di-cs0ggZg'
    );

    // --- CONSTANTE DESIGN ---
    const C = {
      bg: "#FDF6F0", 
      roseDark: "#C97B84", 
      rose: "#E8A4A4", 
      rosePale: "#FDF0EF",
      gold: "#C9A96E", 
      text: "#3D2C2C", 
      textMid: "#7A5C5C", 
      textLight: "#B08080",
      border: "#F0DDD8", 
      success: "#8AAF8A", 
      warn: "#D4A04A", 
      danger: "#C94A4A"
    };

    const HOURS = Array.from({length: 32}, (_, i) => {
      const h = Math.floor(i / 2) + 6;
      const m = i % 2 === 0 ? "00" : "30";
      return `${String(h).padStart(2, "0")}:${m}`;
    }).filter(t => t >= "08:00" && t <= "21:00");

    const NAV = [
      { id: "dashboard", icon: "⬡", label: "Home" },
      { id: "calendar", icon: "▦", label: "Calendar" },
      { id: "appointments", icon: "☰", label: "Programări" },
      { id: "clients", icon: "♡", label: "Clienți" },
      { id: "services", icon: "✦", label: "Servicii" },
      { id: "staff", icon: "◈", label: "Specialiști" },
    ];

    const fmt = d => d.toISOString().split("T")[0];
    const today = new Date();
    const todayStr = fmt(today);

    // --- COMPONENTE UI ---

    function Spinner() {
      return (
        <div style={{ display: "flex", justifyContent: "center", alignItems: "center", padding: "60px 0" }}>
          <div style={{ 
            width: 36, 
            height: 36, 
            border: `3px solid ${C.border}`, 
            borderTop: `3px solid ${C.roseDark}`, 
            borderRadius: "50%", 
            animation: "spin 0.8s linear infinite" 
          }} />
        </div>
      );
    }

    function Modal({ title, onClose, children }) {
      return (
        <div style={{ 
          position: "fixed", 
          inset: 0, 
          background: "rgba(61,44,44,0.5)", 
          zIndex: 1000, 
          display: "flex", 
          alignItems: "flex-end", 
          justifyContent: "center",
          backdropFilter: "blur(3px)"
        }}>
          <div className="fade-in" style={{ 
            background: "#fff", 
            borderRadius: "24px 24px 0 0", 
            padding: "8px 24px 40px", 
            width: "100%", 
            maxWidth: 560, 
            maxHeight: "94vh", 
            overflowY: "auto",
            boxShadow: "0 -10px 40px rgba(0,0,0,0.15)"
          }}>
            <div style={{ width: 40, height: 4, background: C.border, borderRadius: 10, margin: "10px auto 18px" }} />
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
              <h2 style={{ fontSize: 20, fontWeight: 800, color: C.text, fontFamily: "Georgia, serif" }}>{title}</h2>
              <button onClick={onClose} style={{ background: C.rosePale, border: "none", width: 32, height: 32, borderRadius: "50%", cursor: "pointer", color: C.textLight }}>✕</button>
            </div>
            {children}
          </div>
        </div>
      );
    }

    function FInput({ label, ...props }) {
      return (
        <div style={{ marginBottom: 15 }}>
          <label style={{ display: "block", fontSize: 11, fontWeight: 800, color: C.textMid, marginBottom: 5, letterSpacing: 0.5, textTransform: "uppercase" }}>{label}</label>
          <input {...props} style={{ 
            width: "100%", 
            padding: "12px 14px", 
            borderRadius: 12, 
            border: `1.5px solid ${C.border}`, 
            fontSize: 15, 
            color: C.text, 
            background: C.rosePale,
            fontFamily: "inherit",
            outline: "none",
            ...props.style
          }} />
        </div>
      );
    }

    function FSelect({ label, children, ...props }) {
      return (
        <div style={{ marginBottom: 15 }}>
          <label style={{ display: "block", fontSize: 11, fontWeight: 800, color: C.textMid, marginBottom: 5, letterSpacing: 0.5, textTransform: "uppercase" }}>{label}</label>
          <select {...props} style={{ 
            width: "100%", 
            padding: "12px 14px", 
            borderRadius: 12, 
            border: `1.5px solid ${C.border}`, 
            fontSize: 15, 
            color: C.text, 
            background: C.rosePale,
            fontFamily: "inherit",
            outline: "none",
            cursor: "pointer"
          }}>
            {children}
          </select>
        </div>
      );
    }

    function Btn({ children, variant = "primary", small, ...props }) {
      const styles = {
        primary: { background: `linear-gradient(135deg, ${C.roseDark}, ${C.gold})`, color: "#fff", border: "none" },
        secondary: { background: "transparent", color: C.roseDark, border: `1.5px solid ${C.roseDark}` },
        danger: { background: "#FFF0F0", color: C.danger, border: "none" }
      };
      return (
        <button {...props} style={{ 
          padding: small ? "7px 14px" : "12px 20px", 
          borderRadius: 12, 
          fontWeight: 700, 
          fontSize: small ? 12 : 14, 
          cursor: "pointer", 
          transition: "transform 0.1s",
          ...styles[variant], 
          ...props.style 
        }}>
          {children}
        </button>
      );
    }

    // --- MODAL SUMAR SĂPTĂMÂNĂ (CEL DIN CODUL ORIGINAL) ---
    function WeekSummaryModal({ title, apps, services, onClose }) {
      const grouped = {};
      apps.forEach(app => {
        if (!grouped[app.date]) grouped[app.date] = [];
        grouped[app.date].push(app);
      });
      const sortedDays = Object.keys(grouped).sort();

      return (
        <Modal title={title} onClose={onClose}>
          {sortedDays.length === 0 ? (
            <div style={{ textAlign: "center", padding: "30px 0", color: C.textLight }}>Nicio programare planificată.</div>
          ) : (
            sortedDays.map(date => (
              <div key={date} style={{ marginBottom: 20 }}>
                <div style={{ fontSize: 12, fontWeight: 800, color: C.roseDark, textTransform: "uppercase", borderBottom: `1px solid ${C.border}`, paddingBottom: 5, marginBottom: 10 }}>
                  {new Date(date + "T12:00:00").toLocaleDateString("ro-RO", { weekday: 'long', day: 'numeric', month: 'long' })}
                </div>
                {grouped[date].sort((a,b) => a.time.localeCompare(b.time)).map(app => {
                  const s = services.find(x => x.id === app.service_id);
                  return (
                    <div key={app.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "8px 0" }}>
                      <div style={{ width: 45, fontWeight: 800, fontSize: 13, color: C.text }}>{app.time}</div>
                      <div style={{ width: 3, height: 20, background: s?.color || C.rose, borderRadius: 2 }} />
                      <div style={{ flex: 1, fontSize: 14 }}>
                        <strong>{app.client_name}</strong> <span style={{ color: C.textLight }}>- {s?.name}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            ))
          )}
        </Modal>
      );
    }

    // --- APLICAȚIA PRINCIPALĂ ---

    function App() {
      const [page, setPage] = useState("dashboard");
      const [loading, setLoading] = useState(true);
      const [isMobile, setIsMobile] = useState(window.innerWidth < 768);

      // State Date
      const [appointments, setAppointments] = useState([]);
      const [clients, setClients] = useState([]);
      const [services, setServices] = useState([]);
      const [staffList, setStaffList] = useState([]);

      // State UI
      const [showForm, setShowForm] = useState(false);
      const [editAppId, setEditAppId] = useState(null);
      const [search, setSearch] = useState("");
      const [calDate, setCalDate] = useState(todayStr);
      const [weekModal, setWeekModal] = useState(null);
      const [saving, setSaving] = useState(false);

      // State Formular
      const [form, setForm] = useState({
        clientName: "", phone: "", serviceId: "", staff: "", 
        date: todayStr, time: "09:00", notes: "", status: "in_asteptare"
      });

      // State-uri Management (Services/Staff)
      const [showSvcForm, setShowSvcForm] = useState(false);
      const [svcForm, setSvcForm] = useState({ name: "", duration: 60, price: 0, color: "#E8A4A4" });
      const [editSvcId, setEditSvcId] = useState(null);

      const [showStaffForm, setShowStaffForm] = useState(false);
      const [staffForm, setStaffForm] = useState({ name: "" });
      const [editStaffId, setEditStaffId] = useState(null);

      useEffect(() => {
        const handleResize = () => setIsMobile(window.innerWidth < 768);
        window.addEventListener('resize', handleResize);
        refreshData();
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      async function refreshData() {
        setLoading(true);
        try {
          const [a, c, s, st] = await Promise.all([
            sb.from("appointments").select("*").order("date"),
            sb.from("clients").select("*").order("name"),
            sb.from("services").select("*").order("id"),
            sb.from("staff").select("*").order("name")
          ]);
          setAppointments(a.data || []);
          setClients(c.data || []);
          setServices(s.data || []);
          setStaffList(st.data || []);
        } catch (e) { console.error(e); }
        setLoading(false);
      }

      // --- LOGICĂ TELEFON ---
      function handleNameChange(e) {
        const val = e.target.value;
        setForm(p => ({ ...p, clientName: val }));
        const match = clients.find(c => c.name.toLowerCase().trim() === val.toLowerCase().trim());
        if (match && match.phone) {
          setForm(p => ({ ...p, phone: match.phone }));
        }
      }

      // --- CRUD PROGRAMARI ---
      async function saveApp() {
        if (!form.clientName || !form.serviceId) return alert("Numele și Serviciul sunt necesare.");
        setSaving(true);
        const data = {
          client_name: form.clientName, phone: form.phone,
          service_id: parseInt(form.serviceId), staff: form.staff,
          date: form.date, time: form.time, notes: form.notes, status: form.status
        };

        if (editAppId) await sb.from("appointments").update(data).eq("id", editAppId);
        else await sb.from("appointments").insert(data);

        // Sync Client Table
        const exists = clients.find(c => c.name.toLowerCase().trim() === form.clientName.toLowerCase().trim());
        if (exists) {
          if (form.phone && form.phone !== exists.phone) await sb.from("clients").update({ phone: form.phone }).eq("id", exists.id);
        } else {
          await sb.from("clients").insert({ name: form.clientName, phone: form.phone || "" });
        }

        await refreshData();
        setSaving(false);
        setShowForm(false);
      }

      async function deleteApp(id) {
        if (!confirm("Ștergi programarea?")) return;
        await sb.from("appointments").delete().eq("id", id);
        refreshData();
      }

      // --- PAGINA DASHBOARD (PĂSTRATĂ INTEGRAL) ---
      const DashboardPage = () => {
        const azi = appointments.filter(a => a.date === todayStr);
        const maine = appointments.filter(a => a.date === fmt(new Date(today.getTime() + 86400000)));
        
        // Logica Săptămâni
        const getWeek = (offset) => {
          const d = new Date();
          const day = d.getDay() === 0 ? 7 : d.getDay();
          d.setDate(d.getDate() - day + 1 + (offset * 7));
          const start = fmt(d);
          const endD = new Date(d); endD.setDate(d.getDate() + 6);
          const end = fmt(endD);
          return appointments.filter(a => a.date >= start && a.date <= end);
        };

        const saptAsta = getWeek(0);
        const saptViit = getWeek(1);

        return (
          <div className="fade-in" style={{ padding: isMobile ? "16px" : "32px" }}>
            {isMobile && (
              <div style={{ marginBottom: 20 }}>
                <div style={{ fontSize: 10, color: C.gold, letterSpacing: 2, textTransform: "uppercase", fontWeight: 800 }}>Natalie Studio</div>
                <h1 style={{ fontFamily: "Georgia, serif", fontSize: 24 }}>Bună ziua! ✦</h1>
              </div>
            )}
            {!isMobile && (
              <div style={{ marginBottom: 30 }}>
                <h1 style={{ fontFamily: "Georgia, serif", fontSize: 32 }}>Bună ziua! ✦</h1>
                <p style={{ color: C.textLight }}>Rezumatul salonului pentru astăzi</p>
              </div>
            )}

            <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr 1fr" : "1fr 1fr 1fr 1fr", gap: 12, marginBottom: 25 }}>
              {[
                { label: "Programări Azi", val: azi.length, icon: "▦", col: C.roseDark, click: null },
                { label: "Săpt. Curentă", val: saptAsta.length, icon: "◈", col: C.roseDark, click: () => setWeekModal({ title: "Săptămâna Curentă", apps: saptAsta }) },
                { label: "Mâine", val: maine.length, icon: "◷", col: C.gold, click: null },
                { label: "Săpt. Viitoare", val: saptViit.length, icon: "◈", col: C.gold, click: () => setWeekModal({ title: "Săptămâna Viitoare", apps: saptViit }) },
              ].map((s, i) => (
                <div key={i} onClick={s.click} style={{ background: "#fff", padding: "16px", borderRadius: 18, border: `1px solid ${C.border}`, cursor: s.click ? "pointer" : "default" }}>
                  <div style={{ fontSize: 10, fontWeight: 800, color: C.textLight, textTransform: "uppercase", marginBottom: 8 }}>{s.label}</div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                    <div style={{ fontSize: 26, fontWeight: 800, color: C.text, fontFamily: "Georgia, serif" }}>{s.val}</div>
                    <div style={{ color: s.col, fontSize: 18 }}>{s.icon}</div>
                  </div>
                  {s.click && <div style={{ fontSize: 9, color: s.col, marginTop: 5, fontWeight: 800 }}>VEZI DETALII →</div>}
                </div>
              ))}
            </div>

            <div style={{ background: "#fff", padding: 20, borderRadius: 24, border: `1px solid ${C.border}`, boxShadow: "0 2px 10px rgba(0,0,0,0.02)" }}>
              <h3 style={{ fontFamily: "Georgia, serif", marginBottom: 15, fontSize: 16 }}>Programări de astăzi</h3>
              {azi.length === 0 ? (
                <div style={{ textAlign: "center", padding: "30px 0", color: C.textLight, fontSize: 14 }}>Nicio programare astăzi.</div>
              ) : (
                azi.sort((a,b) => a.time.localeCompare(b.time)).map(a => {
                  const s = services.find(x => x.id === a.service_id);
                  return (
                    <div key={a.id} onClick={() => { setEditAppId(a.id); setForm({clientName: a.client_name, phone: a.phone||"", serviceId: a.service_id, staff: a.staff, date: a.date, time: a.time, notes: a.notes||"", status: a.status}); setShowForm(true); }} style={{ display: "flex", alignItems: "center", gap: 15, padding: "12px 0", borderBottom: `1px solid ${C.rosePale}`, cursor: "pointer" }}>
                      <div style={{ width: 45, fontWeight: 800, color: C.roseDark, fontSize: 14 }}>{a.time}</div>
                      <div style={{ width: 3, height: 35, borderRadius: 4, background: s?.color || C.rose }} />
                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: 700, fontSize: 15 }}>{a.client_name}</div>
                        <div style={{ fontSize: 12, color: C.textLight }}>{s?.name} · {a.staff}</div>
                      </div>
                      <div style={{ fontSize: 16 }}>›</div>
                    </div>
                  );
                })
              )}
            </div>
          </div>
        );
      };

      // --- PAGINA CALENDAR (PĂSTRATĂ INTEGRAL) ---
      const CalendarPage = () => {
        const dayApps = appointments.filter(a => a.date === calDate);
        return (
          <div className="fade-in" style={{ padding: isMobile ? "16px" : "32px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
              <h1 style={{ fontFamily: "Georgia, serif", fontSize: 24 }}>Calendar</h1>
              <input type="date" value={calDate} onChange={e => setCalDate(e.target.value)} style={{ padding: "10px", borderRadius: 12, border: `1px solid ${C.border}`, fontFamily: "inherit", outline: "none", background: "#fff" }} />
            </div>
            <div style={{ background: "#fff", borderRadius: 24, border: `1px solid ${C.border}`, overflow: "hidden" }}>
              <div style={{ padding: "15px 20px", background: C.rosePale, borderBottom: `1px solid ${C.border}`, fontWeight: 800, fontSize: 14, color: C.roseDark }}>
                {new Date(calDate + "T12:00:00").toLocaleDateString("ro-RO", { weekday: 'long', day: 'numeric', month: 'long' })}
              </div>
              <div className="custom-scroll" style={{ maxHeight: "70vh", overflowY: "auto" }}>
                {HOURS.map(h => {
                  const app = dayApps.find(a => a.time === h);
                  const s = services.find(x => x.id === app?.service_id);
                  return (
                    <div key={h} style={{ display: "flex", minHeight: 65, borderBottom: `1px solid ${C.rosePale}` }}>
                      <div style={{ width: 60, padding: "15px 10px", fontSize: 11, fontWeight: 800, color: C.textLight, textAlign: "right", borderRight: `1px solid ${C.rosePale}` }}>{h}</div>
                      <div style={{ flex: 1, padding: "4px" }}>
                        {app && (
                          <div onClick={() => { setEditAppId(app.id); setForm({clientName: app.client_name, phone: app.phone||"", serviceId: app.service_id, staff: app.staff, date: app.date, time: app.time, notes: app.notes||"", status: app.status}); setShowForm(true); }} style={{ background: (s?.color || C.rose) + "15", borderLeft: `4px solid ${s?.color || C.rose}`, padding: "10px", borderRadius: 10, height: "100%", cursor: "pointer" }}>
                            <div style={{ fontWeight: 800, fontSize: 14 }}>{app.client_name}</div>
                            <div style={{ fontSize: 11, color: C.textMid }}>{s?.name} · {app.staff}</div>
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        );
      };

      // --- PAGINA CLIENTI (PĂSTRATĂ INTEGRAL) ---
      const ClientsPage = () => (
        <div className="fade-in" style={{ padding: isMobile ? "16px" : "32px" }}>
          <h1 style={{ fontFamily: "Georgia, serif", fontSize: 24, marginBottom: 20 }}>Clienți</h1>
          <FInput placeholder="Caută după nume sau telefon..." value={search} onChange={e => setSearch(e.target.value)} style={{ background: "#fff" }} />
          <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr 1fr", gap: 15 }}>
            {clients.filter(c => c.name.toLowerCase().includes(search.toLowerCase()) || (c.phone && c.phone.includes(search))).map(c => (
              <div key={c.id} style={{ background: "#fff", padding: 20, borderRadius: 20, border: `1px solid ${C.border}`, boxShadow: "0 2px 8px rgba(0,0,0,0.02)" }}>
                <div style={{ fontWeight: 800, fontSize: 17, marginBottom: 4 }}>{c.name}</div>
                <div style={{ color: C.textLight, fontSize: 13, marginBottom: 15 }}>{c.phone || "Fără telefon înregistrat"}</div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div style={{ fontSize: 10, fontWeight: 800, color: C.gold, textTransform: "uppercase" }}>
                    {appointments.filter(a => a.client_name === c.name).length} Vizite Total
                  </div>
                  <Btn small variant="secondary" onClick={() => { setForm(p => ({...p, clientName: c.name, phone: c.phone||""})); setEditAppId(null); setShowForm(true); }}>+ Programare</Btn>
                </div>
              </div>
            ))}
          </div>
        </div>
      );

      // --- PAGINA SERVICII ---
      const ServicesPage = () => (
        <div className="fade-in" style={{ padding: isMobile ? "16px" : "32px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
            <h1 style={{ fontFamily: "Georgia, serif", fontSize: 24 }}>Servicii</h1>
            <Btn small onClick={() => { setEditSvcId(null); setSvcForm({name: "", duration: 60, price: 0, color: "#E8A4A4"}); setShowSvcForm(true); }}>+ Adaugă</Btn>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 12 }}>
            {services.map(s => (
              <div key={s.id} style={{ background: "#fff", padding: 16, borderRadius: 20, border: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ width: 12, height: 12, borderRadius: "50%", background: s.color }} />
                  <div>
                    <div style={{ fontWeight: 800 }}>{s.name}</div>
                    <div style={{ fontSize: 12, color: C.textLight }}>{s.duration} min · {s.price} lei</div>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => { setEditSvcId(s.id); setSvcForm(s); setShowSvcForm(true); }} style={{ border: "none", background: "none", cursor: "pointer", color: C.textLight }}>✎</button>
                  <button onClick={async () => { if(confirm("Ștergi?")) { await sb.from("services").delete().eq("id", s.id); refreshData(); } }} style={{ border: "none", background: "none", cursor: "pointer", color: C.danger }}>✕</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      );

      // --- PAGINA STAFF ---
      const StaffPage = () => (
        <div className="fade-in" style={{ padding: isMobile ? "16px" : "32px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
            <h1 style={{ fontFamily: "Georgia, serif", fontSize: 24 }}>Specialiști</h1>
            <Btn small onClick={() => { setEditStaffId(null); setStaffForm({name: ""}); setShowStaffForm(true); }}>+ Adaugă</Btn>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 12 }}>
            {staffList.map(s => (
              <div key={s.id} style={{ background: "#fff", padding: 18, borderRadius: 20, border: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ fontWeight: 800 }}>{s.name}</div>
                <div style={{ display: "flex", gap: 10 }}>
                  <button onClick={() => { setEditStaffId(s.id); setStaffForm(s); setShowStaffForm(true); }} style={{ border: "none", background: "none", cursor: "pointer", color: C.textLight }}>✎</button>
                  <button onClick={async () => { if(confirm("Ștergi?")) { await sb.from("staff").delete().eq("id", s.id); refreshData(); } }} style={{ border: "none", background: "none", cursor: "pointer", color: C.danger }}>✕</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      );

      // --- PAGINA TOATE PROGRAMĂRILE ---
      const AllAppointmentsPage = () => (
        <div className="fade-in" style={{ padding: isMobile ? "16px" : "32px" }}>
          <h1 style={{ fontFamily: "Georgia, serif", fontSize: 24, marginBottom: 20 }}>Listă Programări</h1>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {appointments.sort((a,b) => b.date.localeCompare(a.date) || b.time.localeCompare(a.time)).map(a => {
              const s = services.find(x => x.id === a.service_id);
              return (
                <div key={a.id} style={{ background: "#fff", padding: 16, borderRadius: 20, border: `1px solid ${C.border}` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                    <div style={{ fontWeight: 800, fontSize: 16 }}>{a.client_name}</div>
                    <div style={{ background: C.rosePale, color: C.roseDark, padding: "4px 10px", borderRadius: 10, fontSize: 12, fontWeight: 800 }}>{a.time}</div>
                  </div>
                  <div style={{ fontSize: 13, color: C.textMid, marginBottom: 12 }}>
                    {new Date(a.date + "T12:00:00").toLocaleDateString("ro-RO")} · {s?.name} · {a.staff}
                  </div>
                  <div style={{ display: "flex", gap: 10 }}>
                    <Btn small variant="secondary" onClick={() => { setEditAppId(a.id); setForm({clientName: a.client_name, phone: a.phone||"", serviceId: a.service_id, staff: a.staff, date: a.date, time: a.time, notes: a.notes||"", status: a.status}); setShowForm(true); }}>Editează</Btn>
                    <Btn small variant="danger" onClick={() => deleteApp(a.id)}>Șterge</Btn>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );

      // --- RENDER MAIN ---

      return (
        <div style={{ display: isMobile ? "block" : "flex", minHeight: "100vh" }}>
          {/* SIDEBAR DESKTOP */}
          {!isMobile && (
            <div style={{ width: 260, background: "#3D2C2C", color: "#fff", padding: "40px 24px", position: "sticky", top: 0, height: "100vh", display: "flex", flexDirection: "column" }}>
              <div style={{ marginBottom: 40 }}>
                <h2 style={{ fontFamily: "Georgia, serif", color: C.gold, fontSize: 22 }}>Natalie Studio</h2>
                <div style={{ fontSize: 10, color: "rgba(255,255,255,0.3)", letterSpacing: 2, textTransform: "uppercase", marginTop: 5 }}>Beauty Management</div>
              </div>
              <nav style={{ flex: 1 }}>
                {NAV.map(n => (
                  <div key={n.id} onClick={() => setPage(n.id)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "14px 16px", borderRadius: 14, cursor: "pointer", marginBottom: 6, color: page === n.id ? C.rose : "rgba(255,255,255,0.5)", background: page === n.id ? "rgba(255,255,255,0.06)" : "transparent", fontWeight: page === n.id ? 800 : 400 }}>
                    <span style={{ fontSize: 20 }}>{n.icon}</span> {n.label}
                  </div>
                ))}
              </nav>
            </div>
          )}

          {/* CONTINUT PRINCIPAL */}
          <main style={{ flex: 1, position: "relative", paddingBottom: isMobile ? 100 : 40 }}>
            {loading ? <Spinner /> : (
              <>
                {page === "dashboard" && <DashboardPage />}
                {page === "calendar" && <CalendarPage />}
                {page === "appointments" && <AllAppointmentsPage />}
                {page === "clients" && <ClientsPage />}
                {page === "services" && <ServicesPage />}
                {page === "staff" && <StaffPage />}
              </>
            )}

            {/* BUTON PLUTITOR ADAUGARE */}
            <button onClick={() => { setEditAppId(null); setForm({clientName: "", phone: "", serviceId: services[0]?.id || "", staff: staffList[0]?.name || "", date: todayStr, time: "09:00", notes: "", status: "in_asteptare"}); setShowForm(true); }} style={{ position: "fixed", bottom: isMobile ? 85 : 30, right: 20, width: 60, height: 60, borderRadius: "50%", background: C.roseDark, color: "#fff", border: "none", fontSize: 32, boxShadow: "0 6px 20px rgba(201,123,132,0.4)", cursor: "pointer", zIndex: 900, display: "flex", alignItems: "center", justifyContent: "center" }}>+</button>
          </main>

          {/* NAVIGATIE MOBIL */}
          {isMobile && (
            <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "#3D2C2C", display: "flex", padding: "10px 5px 25px", borderTop: "1px solid rgba(255,255,255,0.1)", zIndex: 1000 }}>
              {NAV.map(n => (
                <div key={n.id} onClick={() => setPage(n.id)} style={{ flex: 1, textAlign: "center", color: page === n.id ? C.rose : "rgba(255,255,255,0.4)", fontSize: 10 }}>
                  <div style={{ fontSize: 22, marginBottom: 4 }}>{n.icon}</div>
                  {n.label}
                </div>
              ))}
            </div>
          )}

          {/* MODAL PROGRAMARE (CU TELEFON) */}
          {showForm && (
            <Modal title={editAppId ? "Editează Programarea" : "Programare Nouă"} onClose={() => setShowForm(false)}>
              <FInput label="Nume Clientă" value={form.clientName} onChange={handleNameChange} placeholder="Ex: Maria Ionescu..." />
              <FInput label="Număr Telefon" value={form.phone} onChange={e => setForm({...form, phone: e.target.value})} placeholder="Ex: 07xx xxx xxx" />
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <FInput label="Data" type="date" value={form.date} onChange={e => setForm({...form, date: e.target.value})} />
                <FSelect label="Ora" value={form.time} onChange={e => setForm({...form, time: e.target.value})}>
                  {HOURS.map(h => <option key={h} value={h}>{h}</option>)}
                </FSelect>
              </div>
              <FSelect label="Serviciu" value={form.serviceId} onChange={e => setForm({...form, serviceId: e.target.value})}>
                <option value="">Alege un serviciu...</option>
                {services.map(s => <option key={s.id} value={s.id}>{s.name} ({s.price} lei)</option>)}
              </FSelect>
              <FSelect label="Specialist" value={form.staff} onChange={e => setForm({...form, staff: e.target.value})}>
                {staffList.map(s => <option key={s.id} value={s.name}>{s.name}</option>)}
              </FSelect>
              <FInput label="Observații" value={form.notes} onChange={e => setForm({...form, notes: e.target.value})} placeholder="Detalii suplimentare..." />
              
              <div style={{ marginTop: 20 }}>
                <Btn onClick={saveApp} disabled={saving} style={{ width: "100%", marginBottom: 10 }}>{saving ? "Se salvează..." : "Salvează Programarea"}</Btn>
                <Btn variant="secondary" onClick={() => setShowForm(false)} style={{ width: "100%" }}>Anulează</Btn>
              </div>
            </Modal>
          )}

          {/* MODALE MANAGEMENT (SERVICE/STAFF) */}
          {showSvcForm && (
            <Modal title={editSvcId ? "Editează Serviciu" : "Serviciu Nou"} onClose={() => setShowSvcForm(false)}>
              <FInput label="Nume" value={svcForm.name} onChange={e => setSvcForm({...svcForm, name: e.target.value})} />
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <FInput label="Durată (min)" type="number" value={svcForm.duration} onChange={e => setSvcForm({...svcForm, duration: e.target.value})} />
                <FInput label="Preț (lei)" type="number" value={svcForm.price} onChange={e => setSvcForm({...svcForm, price: e.target.value})} />
              </div>
              <FInput label="Culoare" type="color" value={svcForm.color} onChange={e => setSvcForm({...svcForm, color: e.target.value})} style={{ height: 45, padding: 5 }} />
              <Btn onClick={async () => {
                if(editSvcId) await sb.from("services").update(svcForm).eq("id", editSvcId);
                else await sb.from("services").insert(svcForm);
                refreshData(); setShowSvcForm(false);
              }} style={{ width: "100%" }}>Salvează</Btn>
            </Modal>
          )}

          {showStaffForm && (
            <Modal title={editStaffId ? "Editează Specialist" : "Specialist Nou"} onClose={() => setShowStaffForm(false)}>
              <FInput label="Nume Specialist" value={staffForm.name} onChange={e => setStaffForm({name: e.target.value})} />
              <Btn onClick={async () => {
                if(editStaffId) await sb.from("staff").update(staffForm).eq("id", editStaffId);
                else await sb.from("staff").insert(staffForm);
                refreshData(); setShowStaffForm(false);
              }} style={{ width: "100%" }}>Salvează</Btn>
            </Modal>
          )}

          {/* MODAL SUMAR SĂPTĂMÂNĂ */}
          {weekModal && <WeekSummaryModal title={weekModal.title} apps={weekModal.apps} services={services} onClose={() => setWeekModal(null)} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
